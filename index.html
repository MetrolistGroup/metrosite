<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Metrolist — ad-free, open-source YouTube Music client for Android with Material You design." />
    <meta name="theme-color" content="#6C4BCC" />
    <title>Metrolist — YouTube Music Client</title>

    <!-- Perf: preconnect to Google CDNs -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!--
      Nunito 700 + 900  → display headings
      Nunito Sans 400 + 600 → body + labels
      Only the weights we actually use, saves ~40% vs loading all variants
    -->
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&family=Nunito+Sans:wght@400;600&display=swap"
      rel="stylesheet"
    />

    <!--
      Material Symbols Rounded — icon_names subset:
      Only fetches glyphs for the icons listed here instead of the full font.
      This alone cuts ~400 KB → ~12 KB.
    -->
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0&icon_namesandroid,arrow_forward,block,close,cloud_download,code,crowdsource,download,headphones,license,menu,palette"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
